<!DOCTYPE html>
<html lang="{{ site.LanguageCode | default "en" }}">
{{ partial "head.html" . }}
<body class="min-h-screen flex flex-col text-slate-900 dark:text-slate-100 antialiased">
  {{ partial "header.html" . }}
  <main class="flex-1">
    {{ block "main" . }}{{ end }}
  </main>
  {{ partial "footer.html" . }}
  {{ with resources.Get "js/theme-toggle.js" | fingerprint }}
  <script src="{{ .RelPermalink }}" defer></script>
  {{ end }}
</body>
</html>
