{{ define "main" }}
<article class="max-w-3xl mx-auto px-6 py-10 md:py-16">
  <header class="mb-8">
    <h1 class="text-3xl md:text-4xl font-semibold tracking-tight text-slate-900 dark:text-slate-100">
      {{ .Title }}
    </h1>
    {{ if and (not .IsPage) false }}{{/* placeholder */}}{{ end }}
    {{ with .Date }}
      {{ if not $.IsHome }}
        <p class="mt-2 text-sm text-slate-500">{{ .Format "January 2, 2006" }}</p>
      {{ end }}
    {{ end }}
  </header>
  <div class="prose-like">
    {{ .Content }}
  </div>
</article>
{{ end }}
