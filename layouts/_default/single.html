{{ define "main" }}
<article class="max-w-[72rem] mx-auto px-6 py-16 md:py-24">
  <header class="grid grid-cols-12 gap-6 mb-12 md:mb-16">
    <div class="col-span-12 md:col-span-3">
      {{ with .Section }}<p class="caption">§ {{ . | humanize }}</p>{{ end }}
    </div>
    <div class="col-span-12 md:col-span-9">
      <h1 class="font-display font-normal text-[clamp(2.5rem,6vw,4.5rem)] leading-[1.02] tracking-[-0.025em] text-slate-900 dark:text-slate-100">
        {{ .Title }}
      </h1>
      {{ if and (not .IsHome) .Date (not .Date.IsZero) }}
        {{ if in (slice "news") .Section }}
          <p class="mt-4 caption"><time datetime="{{ .Date.Format "2006-01-02" }}">{{ .Date.Format "2006.01.02" }}</time></p>
        {{ end }}
      {{ end }}
    </div>
  </header>

  <div class="grid grid-cols-12 gap-6">
    <div class="col-span-12 md:col-span-9 md:col-start-4">
      <div class="prose-like">
        {{ .Content }}
      </div>
    </div>
  </div>
</article>
{{ end }}
