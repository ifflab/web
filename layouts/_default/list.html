{{ define "main" }}
<section class="max-w-5xl mx-auto px-6 py-10 md:py-16">
  <header class="mb-10">
    <h1 class="text-3xl md:text-4xl font-semibold tracking-tight text-slate-900 dark:text-slate-100">
      {{ .Title }}
    </h1>
    {{ with .Content }}
      <div class="prose-like mt-4">{{ . }}</div>
    {{ end }}
  </header>

  <ul class="space-y-4">
    {{ range .Pages }}
      <li>
        <a href="{{ .RelPermalink }}"
           class="block rounded-lg border border-slate-200 dark:border-slate-800 p-4 hover:border-brand-500 dark:hover:border-brand-500">
          <h2 class="text-lg font-semibold text-slate-900 dark:text-slate-100">{{ .Title }}</h2>
          {{ with .Summary }}
            <p class="mt-1 text-sm text-slate-600 dark:text-slate-400">{{ . | plainify | truncate 160 }}</p>
          {{ end }}
        </a>
      </li>
    {{ else }}
      <li class="text-slate-500">Nothing here yet.</li>
    {{ end }}
  </ul>
</section>
{{ end }}
