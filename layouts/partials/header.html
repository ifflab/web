<header class="border-b hairline">
  <div class="max-w-[72rem] mx-auto px-6 py-5 flex items-center justify-between gap-6 flex-wrap">

    {{/* Wordmark: logo glyph in teal + "iFFLab" in mono small caps */}}
    <a href="/" class="flex items-center gap-2.5 text-slate-900 dark:text-slate-100 group">
      <span class="w-[1.815rem] h-[1.815rem] text-brand-600 dark:text-brand-400" aria-hidden="true">
        {{ partial "svg-logo.html" . }}
      </span>
      <span class="font-mono text-[0.82rem] tracking-[0.14em] uppercase font-medium">
        {{ site.Title }}
      </span>
    </a>

    <nav class="flex items-center gap-5 md:gap-7 text-[0.78rem]">
      {{ range site.Menus.main }}
        {{ $active := or ($.IsMenuCurrent "main" .) ($.HasMenuCurrent "main" .) }}
        <a href="{{ .URL }}"
           class="font-mono uppercase tracking-[0.12em] transition
                  {{ if $active }}text-slate-900 dark:text-slate-100{{ else }}text-slate-500 hover:text-slate-900 dark:text-slate-400 dark:hover:text-slate-100{{ end }}">
          {{ .Name }}
        </a>
      {{ end }}

      {{/* Text-only dark-mode toggle: (light)/(dark) */}}
      <button id="theme-toggle" aria-label="Toggle colour theme"
              class="font-mono uppercase tracking-[0.12em] text-[0.78rem] text-slate-500 hover:text-slate-900 dark:text-slate-400 dark:hover:text-slate-100 cursor-pointer">
        <span class="dark:hidden">(dark)</span>
        <span class="hidden dark:inline">(light)</span>
      </button>
    </nav>
  </div>
</header>
