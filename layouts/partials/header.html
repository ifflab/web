<header class="border-b border-slate-200 dark:border-slate-800">
  <div class="max-w-5xl mx-auto px-6 py-4 flex items-center justify-between gap-4">
    <a href="/" class="flex items-center gap-3 text-slate-900 dark:text-slate-100">
      <span class="inline-flex w-8 h-8 text-brand-600 dark:text-brand-500">
        {{/* inline SVG so it inherits currentColor */}}
        <svg viewBox="0 0 64 64" xmlns="http://www.w3.org/2000/svg" class="w-full h-full" aria-hidden="true">
          <rect x="4" y="4" width="56" height="56" rx="12" fill="currentColor"/>
          <text x="32" y="40" font-family="system-ui, sans-serif" font-size="22"
                font-weight="700" text-anchor="middle" fill="white">if</text>
        </svg>
      </span>
      <span class="font-semibold tracking-tight text-lg">{{ site.Title }}</span>
    </a>

    <nav class="flex items-center gap-1 md:gap-3 text-sm">
      {{ range site.Menus.main }}
        {{ $active := or ($.IsMenuCurrent "main" .) ($.HasMenuCurrent "main" .) }}
        <a href="{{ .URL }}"
           class="px-2 py-1 rounded
                  {{ if $active }}text-slate-900 dark:text-slate-100 font-medium{{ else }}text-slate-600 hover:text-slate-900 dark:text-slate-400 dark:hover:text-slate-100{{ end }}">
          {{ .Name }}
        </a>
      {{ end }}

      <button id="theme-toggle" aria-label="Toggle dark mode"
              class="ml-1 p-2 rounded-md text-slate-600 hover:text-slate-900 hover:bg-slate-100 dark:text-slate-400 dark:hover:text-slate-100 dark:hover:bg-slate-800">
        {{/* sun — visible in dark mode */}}
        <svg class="hidden dark:block w-5 h-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <circle cx="12" cy="12" r="4"/>
          <path d="M12 2v2M12 20v2M4.93 4.93l1.41 1.41M17.66 17.66l1.41 1.41M2 12h2M20 12h2M4.93 19.07l1.41-1.41M17.66 6.34l1.41-1.41"/>
        </svg>
        {{/* moon — visible in light mode */}}
        <svg class="block dark:hidden w-5 h-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
          <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
        </svg>
      </button>
    </nav>
  </div>
</header>
