<footer class="mt-24 border-t hairline">
  <div class="max-w-[72rem] mx-auto px-6 py-10 flex flex-col md:flex-row md:items-start md:justify-between gap-6">
    <div class="flex items-center gap-2.5">
      <span class="w-4 h-4 text-brand-600 dark:text-brand-400" aria-hidden="true">
        {{ partial "svg-nabla.html" . }}
      </span>
      <span class="font-mono text-[0.75rem] tracking-[0.12em] uppercase text-slate-500">
        {{ site.Title }} · © {{ now.Year }}
      </span>
    </div>
    <nav class="font-mono text-[0.75rem] tracking-[0.12em] uppercase flex flex-wrap gap-x-5 gap-y-1 text-slate-500">
      {{ with site.Params.email }}
        <a href="mailto:{{ . }}" class="hover:text-slate-900 dark:hover:text-slate-100">Email</a>
      {{ end }}
      {{ with site.Params.social.github }}
        <a href="https://github.com/{{ . }}" class="hover:text-slate-900 dark:hover:text-slate-100">GitHub</a>
      {{ end }}
      {{ with .OutputFormats.Get "RSS" }}
        <a href="{{ .Permalink }}" class="hover:text-slate-900 dark:hover:text-slate-100">RSS</a>
      {{ end }}
    </nav>
  </div>
</footer>
