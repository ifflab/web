<footer class="border-t border-slate-200 dark:border-slate-800 mt-20">
  <div class="max-w-5xl mx-auto px-6 py-8 text-sm text-slate-500 flex flex-col md:flex-row md:items-center md:justify-between gap-3">
    <p>© {{ now.Year }} {{ site.Title }}. Content available under CC BY 4.0 unless noted.</p>
    <p class="flex flex-wrap gap-x-4 gap-y-1">
      {{ with site.Params.email }}
        <a href="mailto:{{ . }}" class="hover:text-slate-900 dark:hover:text-slate-100">{{ . }}</a>
      {{ end }}
      {{ with site.Params.social.github }}
        <a href="https://github.com/{{ . }}" class="hover:text-slate-900 dark:hover:text-slate-100">GitHub</a>
      {{ end }}
      {{ with .OutputFormats.Get "RSS" }}
        <a href="{{ .Permalink }}" class="hover:text-slate-900 dark:hover:text-slate-100">RSS</a>
      {{ end }}
    </p>
  </div>
</footer>
