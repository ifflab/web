{{ define "main" }}
<section class="max-w-5xl mx-auto px-6 py-10 md:py-16">
  <header class="mb-10">
    <h1 class="text-3xl md:text-4xl font-semibold tracking-tight text-slate-900 dark:text-slate-100">
      Research
    </h1>
    {{ with .Content }}
      <div class="prose-like mt-4 max-w-2xl">{{ . }}</div>
    {{ end }}
  </header>

  <ul class="grid gap-5 md:grid-cols-2">
    {{ range .RegularPages.ByWeight }}
      <li>
        <a href="{{ .RelPermalink }}"
           class="block h-full rounded-lg border border-slate-200 dark:border-slate-800 p-6 hover:border-brand-500 dark:hover:border-brand-500">
          <h2 class="text-xl font-semibold text-slate-900 dark:text-slate-100">{{ .Title }}</h2>
          {{ with .Summary }}
            <p class="mt-3 text-sm text-slate-600 dark:text-slate-400">{{ . | plainify | truncate 240 }}</p>
          {{ end }}
          <p class="mt-4 text-sm text-brand-700 dark:text-brand-500">Read more →</p>
        </a>
      </li>
    {{ else }}
      <li class="text-slate-500">No research topics added yet.</li>
    {{ end }}
  </ul>
</section>
{{ end }}
